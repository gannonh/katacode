  "@effect/sql-pg": "catalog:"
  "@effect/sql-sqlite-bun": "catalog:"
  "@effect/vitest": "catalog:"
  "@effect/vitest>@vitest/runner": "-"
  "@effect/vitest>vitest": "-"
  "@expo/metro-config": 56.0.13
  "@types/node": "catalog:"
  effect: "catalog:"
  react-native-nitro-modules: 0.35.9
  vite: "catalog:"
  vitest: "catalog:"
  yaml: "catalog:"

packageExtensions:
