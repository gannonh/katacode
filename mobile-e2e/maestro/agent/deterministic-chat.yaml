# @agent — deterministic real-provider reply.
#
# The TS harness starts the loopback server, registers a seeded project, and injects
# KC_PROMPT, KC_MODEL, and KC_EXPECTED (see src/flows/agent.ts). It assumes a paired
# environment: compose the bearer-pairing steps first (or run @pairing) before this
# flow in a real run. The green runtime pass is a maintainer responsibility and needs
# provider credentials (KATACODE_E2E_AGENT_PROVIDER / _MODEL + the provider key).
appId: com.katacode.dev
tags:
  - agent
---
- launchApp:
    clearState: false
# TODO(studio): open the paired environment and start a new thread/task.
# TODO(studio): select model ${KC_MODEL} in the composer model picker — the default
# model is not reliable for deterministic replies.
- tapOn: "Ask the repo agent, or run a command…"
- inputText: ${KC_PROMPT}
# TODO(studio): tap the send control (confirm its accessibility id).
# Assert the real provider returned exactly the expected token (whitespace/wrapper
# normalization is owned by src/flows/agent.ts).
- extendedWaitUntil:
    visible: ${KC_EXPECTED}
    timeout: 120000
